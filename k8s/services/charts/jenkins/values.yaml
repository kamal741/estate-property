# Default values for the estate-property Jenkins chart.
# Build the image from repo root: docker build -f jenkins/Dockerfile -t <registry>/jenkins:<tag> .

replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: estate-property/jenkins
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 8080
  agentPort: 50000
  annotations: {}

agentListener:
  enabled: true

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /var/jenkins_home

resources:
  limits:
    cpu: "2"
    memory: 3Gi
  requests:
    cpu: "500m"
    memory: 1536Mi

javaOpts: "-XX:+UseG1GC -Djenkins.install.runSetupWizard=false"

# Passed to the controller process in addition to JAVA_OPTS (see jenkins.sh). Duplicate
# -Djenkins.install.runSetupWizard=false is harmless and covers mis-merged javaOpts.
jenkinsOpts: "-Djenkins.install.runSetupWizard=false"

extraEnv: []

# Local admin user (Hudson private security realm). Requires a Kubernetes Secret before first meaningful boot.
# When enabled, the controller reads JENKINS_ADMIN_PASSWORD from the Secret (see init.groovy.d/01-configureSecurityRealm.groovy).
# optionalSecret: true → secretKeyRef.optional so the pod still starts if the Secret is missing (dev convenience; create Secret + restart to enable auth).
security:
  localAdmin:
    enabled: false
    username: admin
    existingSecret: ""
    existingSecretKey: password
    optionalSecret: false

# Jenkins often needs several minutes before HTTP responds; startupProbe gates
# liveness/readiness until the first successful check (K8s 1.16+).
startupProbe:
  enabled: true
  path: /login
  periodSeconds: 10
  timeoutSeconds: 15
  failureThreshold: 42

livenessProbe:
  path: /login
  initialDelaySeconds: 90
  periodSeconds: 30
  timeoutSeconds: 15
  failureThreshold: 5

readinessProbe:
  path: /login
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 15
  failureThreshold: 6

nodeSelector: {}
tolerations: []
affinity: {}
