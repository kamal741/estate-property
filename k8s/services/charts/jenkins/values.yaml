# Default values for the estate-property Jenkins chart.
# Build the image from repo root: docker build -f jenkins/Dockerfile -t <registry>/jenkins:<tag> .

replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: estate-property/jenkins
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

service:
  type: LoadBalancer
  port: 8080
  agentPort: 50000
  annotations: {}

agentListener:
  enabled: true

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /var/jenkins_home
  # Retain PVC on helm uninstall; do not use HELM_UPGRADE_FORCE with this chart — bound PVC spec is immutable.
  annotations:
    helm.sh/resource-policy: keep

resources:
  limits:
    cpu: "2"
    memory: 3Gi
  requests:
    cpu: "500m"
    memory: 1536Mi

javaOpts: "-XX:+UseG1GC -Djenkins.install.runSetupWizard=false"

# Passed to the controller process in addition to JAVA_OPTS (see jenkins.sh). Duplicate
# -Djenkins.install.runSetupWizard=false is harmless and covers mis-merged javaOpts.
jenkinsOpts: "-Djenkins.install.runSetupWizard=false"

extraEnv: []

# Local admin user (Hudson private security realm). Requires a Kubernetes Secret before first meaningful boot.
# When enabled, the controller reads JENKINS_ADMIN_PASSWORD from the Secret (see init.groovy.d/01-configureSecurityRealm.groovy).
# optionalSecret: true → secretKeyRef.optional so the pod still starts if the Secret is missing (dev convenience; create Secret + restart to enable auth).
security:
  localAdmin:
    enabled: false
    username: admin
    existingSecret: ""
    existingSecretKey: password
    optionalSecret: false

# Startup: tcpSocket (default) waits for port 8080 only. HTTP /login often returns 503 while plugins load and
# times out waiting for headers — http probes would kill the pod. Set startupProbe.tcpSocket: false to use httpGet.path instead.
startupProbe:
  enabled: true
  tcpSocket: true
  path: /login
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 180

# After startup succeeds, Jenkins may still serve 503 on /login for several minutes — keep liveness lenient.
livenessProbe:
  path: /login
  initialDelaySeconds: 120
  periodSeconds: 20
  timeoutSeconds: 30
  failureThreshold: 30

readinessProbe:
  path: /login
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 30
  failureThreshold: 60

nodeSelector: {}
tolerations: []
affinity: {}

env: dev