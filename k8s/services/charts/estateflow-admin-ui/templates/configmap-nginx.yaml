apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "estateflow-admin-ui.fullname" . }}-nginx
  labels:
    {{- include "estateflow-admin-ui.labels" . | nindent 4 }}
data:
  default.conf: |
    upstream estateflow_admin_upstream {
        server {{ .Values.apiUpstreams.admin.host }}:{{ .Values.apiUpstreams.admin.port }};
        keepalive 32;
    }
    upstream estateflow_brokerage_agent_upstream {
        server {{ .Values.apiUpstreams.brokerageAgent.host }}:{{ .Values.apiUpstreams.brokerageAgent.port }};
        keepalive 32;
    }
    upstream estateflow_client_upstream {
        server {{ .Values.apiUpstreams.client.host }}:{{ .Values.apiUpstreams.client.port }};
        keepalive 32;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_types text/css application/javascript application/json image/svg+xml;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        location ^~ /api/admin/ {
            proxy_pass http://estateflow_admin_upstream;
        }

        location ^~ /api/portal/ {
            proxy_pass http://estateflow_brokerage_agent_upstream;
        }

        location ^~ /api/broker/ {
            proxy_pass http://estateflow_brokerage_agent_upstream;
        }

        location ^~ /api/agent/ {
            proxy_pass http://estateflow_brokerage_agent_upstream;
        }

        location ^~ /api/properties {
            proxy_pass http://estateflow_client_upstream;
        }

        location ^~ /api/client/ {
            proxy_pass http://estateflow_client_upstream;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location = /index.html {
            add_header Cache-Control "no-cache";
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
