replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: estateflow-admin-ui
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Cluster DNS names of EstateFlow API Services (Helm release names by default).
apiUpstreams:
  admin:
    host: estateflow-admin-service
    port: 8080
  brokerageAgent:
    host: estateflow-brokerage-agent-service
    port: 8081
  client:
    host: estateflow-client-service
    port: 8082

podAnnotations: {}

podSecurityContext:
  fsGroup: 101

securityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 80
  annotations: {}

containerPort: 80

resources:
  limits:
    cpu: "500m"
    memory: 256Mi
  requests:
    cpu: "100m"
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}
