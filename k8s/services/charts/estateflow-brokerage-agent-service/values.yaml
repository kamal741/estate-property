replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: estateflow-brokerage-agent-service
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

databaseHost: ""

databaseNames:
  platform: estateflow_platform
  master: estateflow_master
  broker: estateflow_broker_default

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 101

securityContext:
  runAsNonRoot: true
  runAsUser: 100
  runAsGroup: 101
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 8081
  annotations: {}

containerPort: 8081

javaOpts: "-XX:MaxRAMPercentage=75.0"

serviceEnv:
  SPRING_PROFILES_ACTIVE: dev
  PORT: "8081"
  JWT_SECRET: dev-secret-must-be-at-least-32-bytes-long!

extraEnv: []

envFrom: []

resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: "250m"
    memory: 512Mi

startupProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 0
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}
