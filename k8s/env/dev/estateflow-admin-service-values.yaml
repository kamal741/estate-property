# Dev overrides: namespace defaults to Terraform **gke_namespace** (e.g. dev-estateflow) via deploy.sh.
# Deploy (from repo root) — **image.repository** is injected from Terraform (**artifact_registry_docker_prefix**/estateflow-admin-service)
# or from GCP_PROJECT_ID + GCP_REGION + ARTIFACT_REGISTRY_REPOSITORY; override with ESTATEFLOW_ADMIN_SERVICE_IMAGE_REPOSITORY:
#   ./k8s/scripts/deploy.sh dev estateflow-admin-service --set-string image.tag=YOUR_TAG \
#     --set-string databaseHost="$(cd deployment/terraform/envs/dev && terraform output -raw db_private_ip)"
#
# Image path matches Jenkins **IMAGE_REPOSITORY**/estateflow-admin-service (see jenkins-jobs/Pipeline_Deploy.groovy).
#
# Database + Redis credentials: Terraform creates Kubernetes Secrets **estateflow-admin-db** and
# **estateflow-redis** in `dev-estateflow` when `create_app_runtime_secrets` is true (default) in
# `deployment/terraform/envs/dev`. No manual `kubectl create secret` needed unless you disable that
# or use External Secrets instead.
# Override: set `create_app_runtime_secrets = false` in `terraform.tfvars` and manage secrets yourself.
# If apply fails because a secret already exists, delete it once: `kubectl delete secret estateflow-admin-db -n dev-estateflow` (same for estateflow-redis), then re-apply.
#
# Passwords are also in Secret Manager (`dev-db-password`, `dev-redis-auth`, `dev-redis-host`).
# To use different secret names or keys, edit the valueFrom blocks under adminServiceEnv below.

image:
  tag: dev
  pullPolicy: IfNotPresent

# Set at deploy time to match Cloud SQL (private IP when enable_private_sql is true).
databaseHost: ""

databaseNames:
  platform: estateflow_platform
  master: estateflow_master
  broker: estateflow_broker_default
  admin: estateflow

adminServiceEnv:
  SPRING_PROFILES_ACTIVE: dev
  PORT: "8080"
  DATABASE_USERNAME:
    valueFrom:
      secretKeyRef:
        name: estateflow-admin-db
        key: username
  DATABASE_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: estateflow-admin-db
        key: password
  JWT_SECRET: dev-secret-must-be-at-least-32-bytes-long!
  REDIS_HOST:
    valueFrom:
      secretKeyRef:
        name: estateflow-redis
        key: host
  REDIS_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: estateflow-redis
        key: password
  SPRING_MAIL_HOST: mailhog
  SPRING_MAIL_PORT: 1025
  SPRING_MAIL_USERNAME: ""
  SPRING_MAIL_PASSWORD: ""
  SPRING_MAIL_FROM: noreply@estateflow.local
  SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "false"
  SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "false"
  SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED: "false"
  BROKER_OWNER_PORTAL_LOGIN_BASE_URL: http://localhost:3000/broker/login

replicaCount: 1
