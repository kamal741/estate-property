# Dev routes for platform-ingress (one Ingress object, all hosts — required for GKE static IP).
#
# Hosts use nip.io so laptops without /etc/hosts still resolve to the ingress IP (public DNS).
# If `kubectl get ingress -n dev-estateflow` ADDRESS changes, update every host below to match, then redeploy.
#   Admin UI:  http://app.136.110.170.163.nip.io/
#   API:       http://api.136.110.170.163.nip.io/
#   Jenkins:   http://jenkins.136.110.170.163.nip.io/
# Plain http://<ADDRESS>/ will 404 on GCE — the Host header must match a rule below.
# Real domain later: replace nip.io hosts and point DNS A records at the ingress ADDRESS.
# Jenkins “Jenkins URL” should match the jenkins host you use, or redirects may break.
#
# Deploy (from repo root):
#   ./k8s/scripts/deploy.sh dev platform-ingress
#
# Or manually:
#   helm upgrade --install platform-ingress k8s/services/charts/platform-ingress \
#     -n kube-system --create-namespace -f k8s/env/dev/platform-ingress-values.yaml
#
# Add more services later: copy a route block, or add k8s/env/dev/<app>-values.yaml and a matching `helm install` for that chart.
#
# GKE: use IngressClass gce (annotation kubernetes.io/ingress.class alone is deprecated on newer clusters).
ingressClassName: gce

routes:
  - name: jenkins
    annotations:
      kubernetes.io/ingress.class: "gce"
      kubernetes.io/ingress.global-static-ip-name: "dev-estateflow-ingress-ip"
    # Same namespace as Jenkins Helm release (Terraform app ns: dev-estateflow).
    namespace: dev-estateflow
    host: jenkins.136.110.170.163.nip.io
    serviceName: jenkins
    servicePort: 8080
    path: /
    pathType: Prefix
    labels:
      app.kubernetes.io/name: jenkins
      app.kubernetes.io/component: ingress

  # Namespace matches Terraform app ns (dev-estateflow). serviceName = Helm release / Service name
  # from ./k8s/scripts/deploy.sh dev estateflow-admin-service (default: estateflow-admin-service).
  - name: estateflow-admin-service
    annotations:
      kubernetes.io/ingress.class: "gce"
      kubernetes.io/ingress.global-static-ip-name: "dev-estateflow-ingress-ip"
    namespace: dev-estateflow
    host: api.136.110.170.163.nip.io
    serviceName: estateflow-admin-service
    servicePort: 8080
    path: /
    pathType: Prefix
    labels:
      app.kubernetes.io/name: estateflow-admin-service
      app.kubernetes.io/component: ingress

  # Admin UI (nginx proxies /api/* to cluster Services; broker/client APIs are not exposed on separate hosts).
  - name: estateflow-admin-ui
    annotations:
      kubernetes.io/ingress.class: "gce"
      kubernetes.io/ingress.global-static-ip-name: "dev-estateflow-ingress-ip"
    namespace: dev-estateflow
    host: app.136.110.170.163.nip.io
    serviceName: estateflow-admin-ui
    servicePort: 80
    path: /
    pathType: Prefix
    labels:
      app.kubernetes.io/name: estateflow-admin-ui
      app.kubernetes.io/component: ingress

# Optional per-route TLS (add under that route item):
#   tls:
#     - hosts: [api.dev.example.com]
#       secretName: api-dev-tls
