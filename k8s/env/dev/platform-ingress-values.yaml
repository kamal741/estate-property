# Dev routes for platform-ingress.
#
# No custom domain yet: after `helm upgrade`, confirm the Ingress uses the Terraform static IP:
#   terraform output -raw ingress_static_ip_address   # from deployment/terraform/envs/dev
#   kubectl get ingress -n dev-estateflow
# DNS for the hosts below should point at that address (or use nip.io — if the ADDRESS is 34.8.92.201, set
#   host: jenkins.34.8.92.201.nip.io
# (subdomain left of the IP is arbitrary), redeploy this chart, then open that URL in a browser.
# Alternatively add a line to /etc/hosts: `<ADDRESS> jenkins.dev.local` and set host to `jenkins.dev.local`.
# Jenkins “Jenkins URL” should match the host you use, or redirects may break (configure in UI or init Groovy).
#
# Deploy (from repo root):
#   ./k8s/scripts/deploy.sh dev platform-ingress
#
# Or manually:
#   helm upgrade --install platform-ingress k8s/services/charts/platform-ingress \
#     -n kube-system --create-namespace -f k8s/env/dev/platform-ingress-values.yaml
#
# Add more services later: copy a route block, or add k8s/env/dev/<app>-values.yaml and a matching `helm install` for that chart.
#
# Optional: set only if your ingress controller registers an IngressClass:
# ingressClassName: azure-application-gateway

routes:
  - name: jenkins-ui
    annotations:
      kubernetes.io/ingress.class: "gce"
      kubernetes.io/ingress.global-static-ip-name: "dev-estateflow-ingress-ip"
    # Same namespace as Jenkins Helm release (Terraform app ns: dev-estateflow).
    namespace: dev-estateflow
    # Replace with your real domain, nip.io (see header), or /etc/hosts name once you know the ingress IP.
    host: jenkins.dev.estateflow.com
    serviceName: jenkins
    servicePort: 8080
    path: /
    pathType: Prefix
    labels:
      app.kubernetes.io/name: jenkins
      app.kubernetes.io/component: ingress

  # Namespace matches Terraform app ns (dev-estateflow). serviceName = Helm release / Service name
  # from ./k8s/scripts/deploy.sh dev estateflow-admin-service (default: estateflow-admin-service).
  - name: estateflow-admin-service
    annotations:
      kubernetes.io/ingress.class: "gce"
      kubernetes.io/ingress.global-static-ip-name: "dev-estateflow-ingress-ip"
    namespace: dev-estateflow
    host: api.dev.estateflow.com
    serviceName: estateflow-admin-service
    servicePort: 8080
    path: /
    pathType: Prefix
    labels:
      app.kubernetes.io/name: estateflow-admin-service
      app.kubernetes.io/component: ingress

  # Admin UI (nginx proxies /api/* to cluster Services; broker/client APIs are not exposed on separate hosts).
  - name: estateflow-admin-ui
    annotations:
      kubernetes.io/ingress.class: "gce"
      kubernetes.io/ingress.global-static-ip-name: "dev-estateflow-ingress-ip"
    namespace: dev-estateflow
    host: app.dev.estateflow.com
    serviceName: estateflow-admin-ui
    servicePort: 80
    path: /
    pathType: Prefix
    labels:
      app.kubernetes.io/name: estateflow-admin-ui
      app.kubernetes.io/component: ingress

# Optional per-route TLS (add under that route item):
#   tls:
#     - hosts: [api.dev.example.com]
#       secretName: api-dev-tls
