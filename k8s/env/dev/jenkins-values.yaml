# Dev overrides for the Jenkins chart (flat values schema).
#
# Namespace: `k8s/scripts/deploy.sh` installs Jenkins into Terraform **gke_namespace** (default **dev-estateflow**),
# same as app workloads. Override with **NAMESPACE** or **JENKINS_HELM_NAMESPACE** if needed.
# Migrating from an older `jenkins` namespace: `helm uninstall jenkins -n jenkins` (and remove the PVC if you accept data loss), then deploy again.
#
# Deploy (from repo root):
#   ./k8s/scripts/deploy.sh dev jenkins
#
# Or manually:
#   helm upgrade --install jenkins k8s/services/charts/jenkins -n dev-estateflow \
#     -f k8s/env/dev/jenkins-values.yaml
#
# Pull from Google Artifact Registry: do not put project/region here. At deploy time, image.repository is set by:
#   ./k8s/scripts/deploy.sh (see --help): JENKINS_IMAGE_REPOSITORY, or GCP_PROJECT_ID+GCP_REGION+ARTIFACT_REGISTRY_REPOSITORY,
#   or terraform output jenkins_image_repository. deploy-platform.sh exports JENKINS_IMAGE_REPOSITORY when
#   ARTIFACT_REGISTRY_REPOSITORY is set (with project/region from terraform.tfvars).
#
# Login / security: for **enforced** login, create the Secret then restart the controller pod (or set optionalSecret: false):
#   kubectl create secret generic jenkins-admin -n dev-estateflow --from-literal=password='YOUR_STRONG_PASSWORD'
# With optionalSecret: true (dev default), Helm can install before the Secret exists; init enables security only after the env is set (create Secret + rollout restart).
#
# Helm SSA conflict on Service (e.g. "conflict with kubectl-patch" on spec.type): the Service was changed outside Helm.
# Fix: kubectl delete svc jenkins -n dev-estateflow then redeploy (do not use HELM_UPGRADE_FORCE for jenkins: it tries to
# replace the PVC and fails on immutable bound fields like volumeName). deploy.sh ignores HELM_UPGRADE_FORCE for jenkins.

security:
  localAdmin:
    enabled: true
    optionalSecret: true
    username: admin
    existingSecret: jenkins-admin
    existingSecretKey: password

image:
  tag: dev
  pullPolicy: IfNotPresent

persistence:
  enabled: true
  size: 20Gi
  # storageClass: gp3

resources:
  requests:
    cpu: 250m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 3Gi

javaOpts: "-XX:+UseG1GC -Djenkins.install.runSetupWizard=false -Xms512m -Xmx2048m"

env: dev