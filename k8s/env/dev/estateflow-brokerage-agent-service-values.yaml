# Dev: image.repository and databaseHost are set by k8s/scripts/deploy.sh (or Pipeline_Deploy).
# Deploy: ./k8s/scripts/deploy.sh dev estateflow-brokerage-agent-service --set-string image.tag=YOUR_TAG

image:
  tag: dev
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

databaseHost: ""

databaseNames:
  platform: estateflow_platform
  master: estateflow_master
  broker: estateflow_broker_default

serviceEnv:
  SPRING_PROFILES_ACTIVE: dev
  PORT: "8081"
  DATABASE_USERNAME:
    valueFrom:
      secretKeyRef:
        name: estateflow-admin-db
        key: username
  DATABASE_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: estateflow-admin-db
        key: password
  JWT_SECRET: dev-secret-must-be-at-least-32-bytes-long!
  ESTATEFLOW_DS_MAX_POOL_SIZE: "2"
  ESTATEFLOW_DS_MIN_IDLE: "0"
  REDIS_HOST:
    valueFrom:
      secretKeyRef:
        name: estateflow-redis
        key: host
  REDIS_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: estateflow-redis
        key: password

replicaCount: 1
