# Prod routes for platform-ingress.
#
# Deploy (from repo root):
#   ./k8s/scripts/deploy.sh prod platform-ingress
#
# Or manually:
#   helm upgrade --install platform-ingress k8s/services/charts/platform-ingress \
#     -n kube-system --create-namespace -f k8s/env/prod/platform-ingress-values.yaml
#
# Point DNS and TLS secrets at these hosts before switching traffic.
#
# Optional: set only if your ingress controller registers an IngressClass:
# ingressClassName: azure-application-gateway

# Static IP name must match Terraform: `terraform output -raw ingress_static_ip_name` (e.g. prod-estateflow-ingress-ip).

routes:
  - name: jenkins-ui
    annotations:
      kubernetes.io/ingress.class: "gce"
      kubernetes.io/ingress.global-static-ip-name: "prod-estateflow-ingress-ip"
    namespace: prod-estateflow
    host: jenkins.prod.example.com
    serviceName: jenkins
    servicePort: 8080
    path: /
    pathType: Prefix
    labels:
      app.kubernetes.io/name: jenkins
      app.kubernetes.io/component: ingress

  # Namespace matches Terraform (prod): kubernetes_namespace_v1.app → prod-estateflow
  - name: spring-boot-api
    annotations:
      kubernetes.io/ingress.class: "gce"
      kubernetes.io/ingress.global-static-ip-name: "prod-estateflow-ingress-ip"
    namespace: prod-estateflow
    host: api.prod.example.com
    serviceName: api
    servicePort: 8080
    path: /
    pathType: Prefix
    labels:
      app.kubernetes.io/component: ingress

# Optional TLS: add under the matching route item (same indent as `labels:`):
#   tls:
#     - hosts: [jenkins.prod.example.com]
#       secretName: jenkins-prod-tls
