# Prod overrides for the Jenkins chart (flat values schema).
# Namespace: Terraform **gke_namespace** (default **prod-estateflow**); see k8s/scripts/deploy.sh.
# Migrating from namespace `jenkins`: `helm uninstall jenkins -n jenkins` first if a release name collision occurs.
# Deploy (from repo root):
#   ./k8s/scripts/deploy.sh prod jenkins
#
# Or manually:
#   helm upgrade --install jenkins k8s/services/charts/jenkins -n prod-estateflow \
#     -f k8s/env/prod/jenkins-values.yaml
#
# Pull from Google Artifact Registry: do not put project/region here. At deploy time, image.repository is set by:
#   ./k8s/scripts/deploy.sh (see --help): JENKINS_IMAGE_REPOSITORY, or GCP_PROJECT_ID+GCP_REGION+ARTIFACT_REGISTRY_REPOSITORY,
#   or terraform output jenkins_image_repository. deploy-platform.sh exports JENKINS_IMAGE_REPOSITORY when
#   ARTIFACT_REGISTRY_REPOSITORY is set (with project/region from terraform.tfvars).
#
# Login / security (required for prod):
#   kubectl create secret generic jenkins-admin -n prod-estateflow --from-literal=password='YOUR_STRONG_PASSWORD'

security:
  localAdmin:
    enabled: true
    username: admin
    existingSecret: jenkins-admin
    existingSecretKey: password

image:
  tag: prod
  pullPolicy: IfNotPresent

persistence:
  enabled: true
  size: 50Gi
  # storageClass: gp3

resources:
  requests:
    cpu: "500m"
    memory: 2Gi
  limits:
    cpu: "4"
    memory: 6Gi

javaOpts: "-XX:+UseG1GC -Djenkins.install.runSetupWizard=false -Xms1g -Xmx5g"
