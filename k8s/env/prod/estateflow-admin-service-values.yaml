# Prod overrides: namespace defaults to **prod-estateflow** via deploy.sh.
# **image.repository** is set by deploy.sh from Terraform or GCP_* env (same pattern as dev); see k8s/scripts/deploy.sh --help.
# Deploy:
#   ./k8s/scripts/deploy.sh prod estateflow-admin-service --set-string image.tag=YOUR_TAG
# databaseHost is set automatically from terraform output db_private_ip (or export DATABASE_HOST).
#
# Create Secrets in **prod-estateflow** — by default Terraform creates **estateflow-admin-db** and
# **estateflow-redis** when `deployment/terraform/envs/prod` applies with `create_app_runtime_secrets = true`.
# Set `create_app_runtime_secrets = false` in `terraform.tfvars` if you manage these with External Secrets or kubectl only.

image:
  tag: prod
  pullPolicy: IfNotPresent

databaseHost: ""

databaseNames:
  platform: estateflow_platform
  master: estateflow_master
  broker: estateflow_broker_default
  admin: postgres

adminServiceEnv:
  SPRING_PROFILES_ACTIVE: prod
  PORT: "8080"
  DATABASE_USERNAME:
    valueFrom:
      secretKeyRef:
        name: estateflow-admin-db
        key: username
  DATABASE_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: estateflow-admin-db
        key: password
  JWT_SECRET: dev-secret-must-be-at-least-32-bytes-long!
  ESTATEFLOW_DS_MAX_POOL_SIZE: "3"
  ESTATEFLOW_DS_MIN_IDLE: "0"
  REDIS_HOST:
    valueFrom:
      secretKeyRef:
        name: estateflow-redis
        key: host
  REDIS_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: estateflow-redis
        key: password
  SPRING_MAIL_HOST: mailhog
  SPRING_MAIL_PORT: 1025
  SPRING_MAIL_USERNAME: ""
  SPRING_MAIL_PASSWORD: ""
  SPRING_MAIL_FROM: noreply@estateflow.local
  SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "false"
  SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "false"
  SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED: "false"
  BROKER_OWNER_PORTAL_LOGIN_BASE_URL: http://localhost:3000/broker/login

replicaCount: 2

resources:
  limits:
    cpu: "2"
    memory: 2Gi
  requests:
    cpu: "500m"
    memory: 1Gi
